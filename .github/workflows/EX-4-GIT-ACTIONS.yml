name: 4th ex 

on:
  push:
    branches: main

  pull_request:
    branches: main

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Clone the repo locally
        uses: actions/checkout@v4

      - name: Install flake8
        run: pip install flake8

      - name: Run tests for errors using flake
        run: flake8 app.py

  test-matrix:
    runs-on: ubuntu-latest
    needs: quality-gate
    strategy:
      matrix:
        python-version: ['3.10','3.11','3.12']

    steps:
      - name: Clone the code locally
        uses: actions/checkout@v4

      - name: Install py dependencies  using matrix version
        uses: actions/setup-python@v4
        with:
          python-version: ${{matrix.python-version}}

      - name: pytest install
        run: pip install pytest

      - name: run the pytest test
        run: python -m pytest tests/test_app.py
    
